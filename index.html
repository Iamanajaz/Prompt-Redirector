<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt URL Redirector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1b;
            color: #d7dadc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #272729;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h2 { margin-top: 0; color: #ffffff; }
        textarea {
            width: 100%;
            height: 150px;
            background: #343437;
            border: 1px solid #474748;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            box-sizing: border-box;
        }
        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary { background-color: #10a37f; color: white; }
        .btn-secondary { background-color: #3f3f42; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>Prompt Redirector</h2>
    <p>Enter your code or text below:</p>
    <textarea id="payload" placeholder="Type your prompt here..."></textarea>
    
    <div class="button-group">
        <button class="btn-primary" onclick="launchPrompt()">Launch in ChatGPT</button>
        <button class="btn-secondary" onclick="copyURL()">Copy URL</button>
    </div>
</div>

<script>
    function getGeneratedURL() {
        const baseUrl = "https://chatgpt.com/";
        const text = document.getElementById('payload').value;
        // encodeURIComponent converts special characters (like +, &, {) 
        // into the format needed for a URL.
        return baseUrl + "?prompt=" + encodeURIComponent(text);
    }

    function launchPrompt() {
        const finalUrl = getGeneratedURL();
        // Opens the URL in a new browser tab
        window.open(finalUrl, '_blank');
    }

    function copyURL() {
        const finalUrl = getGeneratedURL();
        navigator.clipboard.writeText(finalUrl).then(() => {
            alert("URL copied to clipboard!");
        });
    }
</script>

</body>
</html>
